name: Bug report
description: Something broken in RVRSE
labels: ["type:bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Load sample X
        2. Set parameter Y to Z
        3. Trigger MIDI note
    validations:
      required: true
  - type: input
    id: daw
    attributes:
      label: DAW + version
      placeholder: e.g. Cubase 13.0.40
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 11
        - Windows 10
        - Other
    validations:
      required: true
  - type: input
    id: rvrse-version
    attributes:
      label: RVRSE version
      placeholder: e.g. v1.0.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
