# Publish Development Build — rolling pre-release from develop branch.
# Builds Debug, packages per-platform zips, publishes to a "develop-latest"
# GitHub pre-release that is force-updated on every push.

name: Publish Development Build

on:
  push:
    branches: [develop]

concurrency:
  group: publish-develop
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # macOS — Ninja, Debug
  # ---------------------------------------------------------------------------
  macos:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Ninja
        run: brew install ninja

      - name: Download iPlug2 SDKs
        working-directory: iPlug2/Dependencies/IPlug
        run: |
          ./download-vst3-sdk.sh
          ./download-clap-sdks.sh

      - name: Configure (Ninja, Debug)
        run: cmake --preset macos-ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build plugins
        run: cmake --build build/macos-ninja --config Debug

      - name: Build and run tests
        run: |
          cmake --build build/macos-ninja --config Debug --target rvrse_tests
          ctest --test-dir build/macos-ninja --output-on-failure

      - name: Package macOS zip
        run: |
          cd build/macos-ninja/out
          staging="$(mktemp -d)"
          for f in RVRSE.vst3 RVRSE.component RVRSE.clap RVRSE.app; do
            [ -e "$f" ] && cp -R -L "$f" "$staging/"
          done
          cd "$staging"
          zip -r "$GITHUB_WORKSPACE/RVRSE-dev-macOS.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: RVRSE-dev-macOS
          path: RVRSE-dev-macOS.zip

  # ---------------------------------------------------------------------------
  # Windows — Visual Studio 2022, Debug
  # ---------------------------------------------------------------------------
  windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Download iPlug2 SDKs
        working-directory: iPlug2/Dependencies/IPlug
        shell: bash
        run: |
          ./download-vst3-sdk.sh
          ./download-clap-sdks.sh

      - name: Configure (VS2022)
        run: cmake --preset windows-vs2022

      - name: Build plugins
        run: cmake --build build/windows-vs2022 --config Debug

      - name: Build and run tests
        run: |
          cmake --build build/windows-vs2022 --config Debug --target rvrse_tests
          ctest --test-dir build/windows-vs2022 -C Debug --output-on-failure

      - name: Package Windows zip
        shell: bash
        run: |
          cd build/windows-vs2022/out
          7z a "$GITHUB_WORKSPACE/RVRSE-dev-Windows.zip" \
            RVRSE.vst3 RVRSE.clap RVRSE.exe 2>/dev/null || \
          7z a "$GITHUB_WORKSPACE/RVRSE-dev-Windows.zip" RVRSE.vst3

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: RVRSE-dev-Windows
          path: RVRSE-dev-Windows.zip

  # ---------------------------------------------------------------------------
  # Publish — rolling pre-release
  # ---------------------------------------------------------------------------
  publish:
    needs: [macos, windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .

      - name: Download all artifacts
        uses: actions/download-artifact@v6

      - name: Publish rolling pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"

          # Delete existing develop-latest release (if any)
          gh release delete develop-latest --yes --cleanup-tag 2>/dev/null || true

          # Create new rolling pre-release
          gh release create develop-latest \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Development Build (latest)" \
            --notes "Rolling development build from the \`develop\` branch.

          **⚠️ This is a development build — not for production use.**

          Built from commit [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) on $(date -u +%Y-%m-%d).

          Debug builds include additional diagnostics and may have reduced performance.

          ### Installation
          Download the zip for your platform, extract, and copy the plugin files to:
          - **macOS AU:** \`~/Library/Audio/Plug-Ins/Components/\`
          - **macOS VST3:** \`~/Library/Audio/Plug-Ins/VST3/\`
          - **macOS CLAP:** \`~/Library/Audio/Plug-Ins/CLAP/\`
          - **Windows VST3:** \`C:\\Program Files\\Common Files\\VST3\\\`
          - **Windows CLAP:** \`C:\\Program Files\\Common Files\\CLAP\\\`

          > macOS users: the build is unsigned. Right-click → Open the plugin the first time, or approve it in System Settings → Privacy & Security." \
            RVRSE-dev-macOS/RVRSE-dev-macOS.zip \
            RVRSE-dev-Windows/RVRSE-dev-Windows.zip
