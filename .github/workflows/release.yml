# Release — build production artifacts on version tags or via manual dispatch.
# Tag pushes publish a GitHub Release. Manual dispatch builds the same signed
# artifacts for smoke-testing without minting a public release.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version label for manual runs (defaults to manual-<run number>)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # macOS — Ninja, Release
  # ---------------------------------------------------------------------------
  macos:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Ninja
        run: brew install ninja

      - name: Download iPlug2 SDKs
        working-directory: iPlug2/Dependencies/IPlug
        run: |
          ./download-vst3-sdk.sh
          ./download-clap-sdks.sh

      - name: Configure (Ninja, Release)
        run: cmake --preset macos-ninja

      - name: Build plugins
        run: cmake --build build/macos-ninja --config Release

      - name: Build and run tests
        run: |
          cmake --build build/macos-ninja --config Release --target rvrse_tests
          ctest --test-dir build/macos-ninja --output-on-failure

      - name: Import signing certificates
        env:
          MACOS_DEV_ID_APP_CERT_P12_BASE64: ${{ secrets.MACOS_DEV_ID_APP_CERT_P12_BASE64 }}
          MACOS_DEV_ID_APP_CERT_PASSWORD: ${{ secrets.MACOS_DEV_ID_APP_CERT_PASSWORD }}
          MACOS_DEV_ID_INSTALLER_CERT_P12_BASE64: ${{ secrets.MACOS_DEV_ID_INSTALLER_CERT_P12_BASE64 }}
          MACOS_DEV_ID_INSTALLER_CERT_PASSWORD: ${{ secrets.MACOS_DEV_ID_INSTALLER_CERT_PASSWORD }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_APP_PASSWORD: ${{ secrets.MACOS_NOTARY_APP_PASSWORD }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: |
          app_cert_path="$RUNNER_TEMP/rvrse-dev-id-app.p12"
          installer_cert_path="$RUNNER_TEMP/rvrse-dev-id-installer.p12"
          keychain_path="$RUNNER_TEMP/rvrse-signing.keychain-db"
          keychain_password="$(openssl rand -base64 24)"

          python3 -c 'import base64, pathlib, sys; pathlib.Path(sys.argv[2]).write_bytes(base64.b64decode(sys.argv[1]))' "${MACOS_DEV_ID_APP_CERT_P12_BASE64}" "${app_cert_path}"
          python3 -c 'import base64, pathlib, sys; pathlib.Path(sys.argv[2]).write_bytes(base64.b64decode(sys.argv[1]))' "${MACOS_DEV_ID_INSTALLER_CERT_P12_BASE64}" "${installer_cert_path}"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          existing_keychains=$(security list-keychains -d user | tr -d '"')
          security list-keychains -d user -s "$keychain_path" $existing_keychains
          security import "$app_cert_path" -k "$keychain_path" -P "$MACOS_DEV_ID_APP_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security import "$installer_cert_path" -k "$keychain_path" -P "$MACOS_DEV_ID_INSTALLER_CERT_PASSWORD" -T /usr/bin/productbuild -T /usr/bin/pkgbuild -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path" >/dev/null

          app_identity=$(security find-identity -v -p codesigning "$keychain_path" | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' | head -n 1)
          installer_identity=$(security find-certificate -a -c "Developer ID Installer" -p "$keychain_path" | openssl x509 -inform pem -noout -subject -nameopt RFC2253 | sed -E 's/.*CN=([^,]+).*/\1/' | head -n 1)

          test -n "$app_identity"
          test -n "$installer_identity"

          {
            echo "MACOS_SIGNING_KEYCHAIN=$keychain_path"
            echo "MACOS_DEV_ID_APPLICATION=$app_identity"
            echo "MACOS_DEV_ID_INSTALLER=$installer_identity"
            echo "MACOS_NOTARY_APPLE_ID=$MACOS_NOTARY_APPLE_ID"
            echo "MACOS_NOTARY_APP_PASSWORD=$MACOS_NOTARY_APP_PASSWORD"
            echo "MACOS_NOTARY_TEAM_ID=$MACOS_NOTARY_TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: Build signed macOS installer
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION="manual-${GITHUB_RUN_NUMBER}"
            fi
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          scripts/sign-and-notarize.sh \
            --build-dir build/macos-ninja \
            --output "build/macos-ninja/dist/RVRSE-${VERSION}-macOS.pkg"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: RVRSE-macOS
          path: build/macos-ninja/dist/RVRSE-*.pkg

      - name: Upload notarization logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: RVRSE-macOS-notary-logs
          path: build/macos-ninja/dist/notarytool-*.json
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Windows — Visual Studio 2022, Release
  # ---------------------------------------------------------------------------
  windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Download iPlug2 SDKs
        working-directory: iPlug2/Dependencies/IPlug
        shell: bash
        run: |
          ./download-vst3-sdk.sh
          ./download-clap-sdks.sh

      - name: Configure (VS2022)
        run: cmake --preset windows-vs2022

      - name: Build plugins
        run: cmake --build build/windows-vs2022 --config Release

      - name: Build and run tests
        run: |
          cmake --build build/windows-vs2022 --config Release --target rvrse_tests
          ctest --test-dir build/windows-vs2022 -C Release --output-on-failure

      - name: Package Windows zip
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION="manual-${GITHUB_RUN_NUMBER}"
            fi
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          cd build/windows-vs2022/out
          cp "$GITHUB_WORKSPACE/RVRSE/installer/INSTALL-Windows.txt" INSTALL.txt
          MANUAL="$GITHUB_WORKSPACE/RVRSE/manual/RVRSE manual.pdf"
          [ -f "$MANUAL" ] && [ "$(wc -c < "$MANUAL")" -gt 10000 ] && cp "$MANUAL" .
          7z a "$GITHUB_WORKSPACE/RVRSE-${VERSION}-Windows.zip" \
            RVRSE.vst3 RVRSE.clap RVRSE.exe INSTALL.txt "RVRSE manual.pdf" 2>/dev/null || \
          7z a "$GITHUB_WORKSPACE/RVRSE-${VERSION}-Windows.zip" RVRSE.vst3 INSTALL.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: RVRSE-Windows
          path: RVRSE-*.zip

  # ---------------------------------------------------------------------------
  # Publish — GitHub Release
  # ---------------------------------------------------------------------------
  publish:
    if: github.event_name == 'push'
    needs: [macos, windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: CHANGELOG.md

      - name: Download all artifacts
        uses: actions/download-artifact@v6

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Try versioned section first (## [0.1.0]), then fall back to [Unreleased]
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES=$(awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          # Write to file to preserve newlines
          echo "$NOTES" > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          gh release create "$GITHUB_REF_NAME" \
            --title "RVRSE ${VERSION}" \
            --notes-file release-notes.md \
            RVRSE-macOS/RVRSE-${VERSION}-macOS.pkg \
            RVRSE-Windows/RVRSE-${VERSION}-Windows.zip

          echo "✅ Published release ${GITHUB_REF_NAME}"
          echo "   https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}"
